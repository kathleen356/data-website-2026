<!-- Critiquing Data Representations — interactive Grade 5/6 lesson (VC2M6ST02) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Critiquing Data Representations · Grade 5/6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16243A; --ink-soft:#4a5a72; --paper:#EAEFF6; --card:#ffffff; --line:#D7DEEA;
  --detective:#E11D74;          /* magenta = the detective's pen: errors & key controls */
  --good:#0E8C86;               /* teal = trustworthy / correct */
  --green:#1F9D57; --green-bg:#e6f5ec;
  --amber:#E0820A; --amber-bg:#fbf0dd;
  --red:#D6453D;   --red-bg:#fbe7e5;
  --display:'Space Grotesk',ui-rounded,'Segoe UI',system-ui,sans-serif;
  --body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:'Space Mono',ui-monospace,Menlo,Consolas,monospace;
  --shadow:0 1px 2px rgba(22,36,58,.06),0 8px 24px rgba(22,36,58,.07);
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--display);line-height:1.12;margin:0}
.num{font-family:var(--mono)}
button{font-family:var(--body);cursor:pointer}
a{color:var(--good)}

/* ---------- layout ---------- */
.shell{display:grid;grid-template-columns:268px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--ink);color:#fff;padding:20px 16px 32px}
.brandmark{font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#9fb2cc}
.brandtitle{font-family:var(--display);font-weight:700;font-size:21px;margin:6px 0 2px;color:#fff}
.brandsub{font-size:12.5px;color:#9fb2cc;margin-bottom:18px}
.navlist{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:2px}
.navlist button{display:flex;gap:11px;align-items:center;width:100%;text-align:left;background:transparent;border:0;color:#cdd8ea;
  padding:9px 11px;border-radius:9px;font-size:13.7px;font-weight:500;transition:background .12s,color .12s}
.navlist button:hover{background:rgba(255,255,255,.07);color:#fff}
.navlist button.active{background:var(--detective);color:#fff}
.navlist .ix{font-family:var(--mono);font-size:11px;width:20px;flex:none;color:inherit;opacity:.8}
.legend{margin-top:22px;border-top:1px solid rgba(255,255,255,.13);padding-top:16px;font-size:12px;color:#aebfd6}
.legend b{color:#fff;font-weight:600}
.legend .row{display:flex;align-items:center;gap:8px;margin:7px 0}
.dot{width:11px;height:11px;border-radius:50%;flex:none}

.main{min-width:0}
.topbar{position:sticky;top:0;z-index:20;background:rgba(234,239,246,.86);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:11px 26px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;background:var(--ink);color:#fff;padding:5px 9px;border-radius:6px}
.topbar .spacer{flex:1}
.ctrl{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px}
.ctrl label{font-size:11.5px;font-weight:600;color:var(--ink-soft);padding:0 6px}
.pill{border:0;background:transparent;border-radius:7px;padding:5px 10px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.pill[aria-pressed="true"]{background:var(--ink);color:#fff}
.pill.g[aria-pressed="true"]{background:var(--green)} .pill.o[aria-pressed="true"]{background:var(--amber)} .pill.r[aria-pressed="true"]{background:var(--red)}
.tswitch{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.toggle{width:42px;height:24px;border-radius:99px;background:var(--line);border:0;position:relative;transition:background .15s}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.toggle[aria-pressed="true"]{background:var(--detective)} .toggle[aria-pressed="true"]::after{left:21px}

.canvas{padding:30px 34px 90px;max-width:1080px;margin:0 auto}
section.view{display:none;animation:rise .32s ease both}
section.view.active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.eyebrow{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--detective);margin-bottom:9px}
.eyebrow.good{color:var(--good)}
.h-title{font-size:clamp(28px,4vw,42px);font-weight:700;letter-spacing:-.01em;margin-bottom:8px}
.lede{font-size:16.5px;color:var(--ink-soft);max-width:64ch;margin-bottom:22px}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow);margin:18px 0}
.card h3{font-size:19px;margin-bottom:6px}
.card .sub{color:var(--ink-soft);font-size:14px;margin-bottom:14px}

/* graph block */
.graphwrap{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start}
@media(max-width:760px){.graphwrap{grid-template-columns:1fr}}
.chart{background:#fbfcfe;border:1px solid var(--line);border-radius:12px;padding:8px}
.chart svg{display:block;width:100%;height:auto}
.modes{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.mode{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:7px 12px;font-size:12.7px;font-weight:600;color:var(--ink-soft);transition:.12s}
.mode:hover{border-color:#b9c4d6}
.mode[aria-pressed="true"]{background:var(--detective);border-color:var(--detective);color:#fff}
.mode.good[aria-pressed="true"]{background:var(--good);border-color:var(--good)}
.findings{margin-top:4px}
.finding{display:flex;gap:10px;align-items:flex-start;font-size:13.6px;padding:8px 0;border-bottom:1px dashed var(--line)}
.finding:last-child{border-bottom:0}
.fbadge{flex:none;width:22px;height:22px;border-radius:50%;background:var(--detective);color:#fff;font-family:var(--mono);font-weight:700;font-size:12px;display:grid;place-items:center}
.fbadge.ok{background:var(--good)}
.note{background:var(--detective);color:#fff;border-radius:10px;padding:10px 13px;font-size:13.3px;font-weight:500;margin-top:12px}
.note.good{background:var(--good)}

/* tally */
table.tally{border-collapse:collapse;width:100%;font-size:14px}
table.tally th,table.tally td{border:1px solid var(--line);padding:7px 10px;text-align:left}
table.tally th{background:var(--paper);font-family:var(--display);font-size:13px}
table.tally td.f{font-family:var(--mono);font-weight:700}
table.tally tr.total td{background:#fbfcfe;font-weight:700}

/* scenario quote */
.scenario{border-left:4px solid var(--detective);background:#fff;border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:16px 18px;margin:16px 0}
.scenario .who{font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--detective);margin-bottom:6px}
.scenario q{font-size:15.5px;font-style:italic;color:var(--ink)}
.scenario .truth{margin-top:11px;font-size:13.5px;color:var(--ink-soft)}
.scenario .truth b{color:var(--ink)}

/* tiered tasks */
.tier{border:1px solid var(--line);border-left-width:5px;border-radius:13px;padding:16px 18px;margin:14px 0;background:var(--card)}
.tier.g{border-left-color:var(--green)} .tier.o{border-left-color:var(--amber)} .tier.r{border-left-color:var(--red)}
.tierhd{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.chip{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;padding:4px 9px;border-radius:6px}
.chip.g{background:var(--green)} .chip.o{background:var(--amber)} .chip.r{background:var(--red)}
.tierhd .label{font-family:var(--display);font-weight:600;font-size:14.5px;color:var(--ink)}
.q{margin:11px 0}
.q .qn{font-family:var(--mono);font-weight:700;color:var(--detective);font-size:13px}
.q p{margin:2px 0}
.q .qtext{font-size:14.5px}
.q .hint{font-size:13px;color:var(--ink-soft);background:var(--paper);border-radius:8px;padding:6px 10px;margin-top:5px;display:inline-block}
.hint::before{content:"Hint  ";font-family:var(--mono);font-weight:700;font-size:10.5px;color:var(--detective);letter-spacing:.05em}

.answers{margin-top:12px}
.revealbtn{border:0;background:var(--ink);color:#fff;border-radius:9px;padding:8px 14px;font-size:12.7px;font-weight:600;display:inline-flex;gap:7px;align-items:center}
.revealbtn:hover{background:#22344f}
.apanel{overflow:hidden;max-height:0;transition:max-height .3s ease;border-radius:10px}
.apanel .inner{background:var(--green-bg);border:1px solid #bfe2cd;border-radius:10px;padding:13px 15px;margin-top:10px;font-size:14px}
.apanel.open{max-height:1400px}
.apanel .inner h5{font-family:var(--display);font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--green);margin:0 0 7px}
.apanel .inner p{margin:6px 0}
.apanel .inner .an{font-family:var(--mono);font-weight:700;color:var(--green)}

/* checklist + steps */
.check{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:640px){.check{grid-template-columns:1fr}}
.check li{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:11px 13px;cursor:pointer;transition:.12s;background:var(--card)}
.check li:hover{border-color:var(--good)}
.check li .box{flex:none;width:22px;height:22px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;color:#fff;font-weight:700;transition:.12s}
.check li.done{background:#f0faf8;border-color:var(--good)}
.check li.done .box{background:var(--good);border-color:var(--good)}
.check li .t{font-size:13.7px}.check li .t b{font-family:var(--display);font-size:13.7px}
.steps{counter-reset:s;list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px}
.steps li{counter-increment:s;position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px 13px 56px}
.steps li::before{content:counter(s);position:absolute;left:15px;top:13px;font-family:var(--mono);font-weight:700;color:#fff;background:var(--ink);width:28px;height:28px;border-radius:8px;display:grid;place-items:center}
.steps li b{font-family:var(--display)}

/* success criteria */
.sc{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px dashed var(--line)}
.sc:last-child{border-bottom:0}
.sc .tag{font-family:var(--mono);font-size:10.5px;font-weight:700;color:#fff;border-radius:5px;padding:4px 7px;flex:none;min-width:38px;text-align:center}
.tag.all{background:var(--ink)} .tag.gg{background:var(--green)} .tag.oo{background:var(--amber)} .tag.rr{background:var(--red)}

/* videos */
.vids{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:760px){.vids{grid-template-columns:1fr}}
.vid{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:13px;padding:16px;background:var(--card)}
.vid .play{width:40px;height:40px;border-radius:11px;background:var(--detective);color:#fff;display:grid;place-items:center;font-size:16px;margin-bottom:10px}
.vid h4{font-size:15.5px;margin-bottom:5px}.vid p{font-size:13px;color:var(--ink-soft);flex:1}
.vid a{margin-top:10px;font-weight:600;font-size:13.5px;text-decoration:none}

/* nav buttons */
.pager{display:flex;justify-content:space-between;gap:12px;margin-top:30px}
.pager button{border:1px solid var(--line);background:var(--card);border-radius:11px;padding:11px 16px;font-size:13.5px;font-weight:600;color:var(--ink);box-shadow:var(--shadow)}
.pager button:hover{border-color:var(--detective);color:var(--detective)}
.pager button:disabled{opacity:.35;cursor:default}
.pager button:disabled:hover{border-color:var(--line);color:var(--ink)}

/* hero / welcome */
.hero{background:linear-gradient(135deg,#16243A,#243a5e);color:#fff;border-radius:20px;padding:40px 36px;box-shadow:var(--shadow)}
.hero .eyebrow{color:#ff8ec2}
.hero h1{font-size:clamp(30px,5vw,52px);letter-spacing:-.015em;margin-bottom:14px}
.hero p{font-size:17px;color:#cdd8ea;max-width:60ch}
.hero .tiles{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
.hero .tile{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:13px;padding:14px 16px;flex:1;min-width:150px}
.hero .tile .k{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#9fb2cc}
.hero .tile .v{font-family:var(--display);font-weight:700;font-size:16px;margin-top:4px}
.startbtn{margin-top:26px;border:0;background:var(--detective);color:#fff;font-family:var(--display);font-weight:700;font-size:15px;padding:13px 22px;border-radius:12px}
.startbtn:hover{background:#c11362}

.bigidea{background:var(--detective);color:#fff;border-radius:20px;padding:40px 36px;text-align:center}
.bigidea h2{font-size:clamp(26px,4.5vw,40px);margin-bottom:12px}
.bigidea p{font-size:17px;max-width:60ch;margin:0 auto;color:#ffe1ef}

/* mobile sidebar */
.menutoggle{display:none}
@media(max-width:880px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:60;width:280px;left:-300px;transition:left .25s;box-shadow:0 0 40px rgba(0,0,0,.4)}
  .sidebar.open{left:0}
  .menutoggle{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:7px 12px;font-weight:700;font-size:13px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* tier filtering */
body.flt-g .tier:not(.g),body.flt-o .tier:not(.o),body.flt-r .tier:not(.r){display:none}
</style>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brandmark">Statistics · Grade 5/6</div>
    <div class="brandtitle">Graph Detective</div>
    <div class="brandsub">Can you trust this graph?</div>
    <nav><ul class="navlist" id="nav"></ul></nav>
    <div class="legend">
      <b>Work through your colour</b>
      <div class="row"><span class="dot" style="background:var(--green)"></span>Green — getting started</div>
      <div class="row"><span class="dot" style="background:var(--amber)"></span>Orange — most students</div>
      <div class="row"><span class="dot" style="background:var(--red)"></span>Red — full challenge</div>
      <div class="row" style="margin-top:12px"><span class="dot" style="background:var(--detective)"></span>Magenta = an error spotted</div>
      <div class="row"><span class="dot" style="background:var(--good)"></span>Teal = a correct graph</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menutoggle" id="menubtn">☰ Menu</button>
      <span class="badge">VC2M6ST02</span>
      <span class="spacer"></span>
      <div class="ctrl">
        <label>Show tier</label>
        <button class="pill" data-flt="all" aria-pressed="true">All</button>
        <button class="pill g" data-flt="g" aria-pressed="false">G</button>
        <button class="pill o" data-flt="o" aria-pressed="false">O</button>
        <button class="pill r" data-flt="r" aria-pressed="false">R</button>
      </div>
      <div class="tswitch">
        <span>Teacher view</span>
        <button class="toggle" id="teacher" aria-pressed="false" aria-label="Reveal all answers"></button>
      </div>
    </div>
    <div class="canvas" id="canvas"></div>
  </div>
</div>

<script>
/* ============================== GRAPH ENGINE ============================== */
const VB={w:440,h:320,L:58,R:18,T:42,B:58};
const plotW=VB.w-VB.L-VB.R, plotH=VB.h-VB.T-VB.B, baseY=VB.T+plotH, topY=VB.T;

function tickY(ticks,k){return baseY-(k/(ticks.length-1))*plotH;}
function valToY(ticks,v){
  const m=ticks.length;
  if(v<=ticks[0])return baseY;
  if(v>=ticks[m-1])return topY;
  for(let i=0;i<m-1;i++){
    if(v>=ticks[i]&&v<=ticks[i+1]){
      const frac=(v-ticks[i])/(ticks[i+1]-ticks[i]);
      return baseY-((i+frac)/(m-1))*plotH;
    }
  }
  return baseY;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}

/* cfg: {bars:[{label,value,color,narrow}], ticks:[], title, yLabel, xLabel, errors:[{type,index}]} */
function renderChart(cfg,highlight){
  const bars=cfg.bars, n=bars.length, slot=plotW/n;
  const E=highlight?(cfg.errors||[]):[];
  const eByBar={}; let axisErr=null,titleErr=null,xErr=null;
  E.forEach((e,i)=>{const num=i+1;
    if(e.type==='bar')eByBar[e.index]=num;
    if(e.type==='yaxis')axisErr=num;
    if(e.type==='title')titleErr=num;
    if(e.type==='xlabel')xErr=num;});
  let s=`<svg viewBox="0 0 ${VB.w} ${VB.h}" role="img" font-family="Space Mono, monospace">`;
  // gridlines + y ticks
  cfg.ticks.forEach((t,k)=>{const y=tickY(cfg.ticks,k);
    s+=`<line x1="${VB.L}" y1="${y}" x2="${VB.L+plotW}" y2="${y}" stroke="#e7ecf3"/>`;
    s+=`<text x="${VB.L-8}" y="${y+4}" text-anchor="end" font-size="11" fill="#6b7a92">${t}</text>`;});
  // axes
  s+=`<line x1="${VB.L}" y1="${topY}" x2="${VB.L}" y2="${baseY}" stroke="#9aa8bd" stroke-width="1.4"/>`;
  s+=`<line x1="${VB.L}" y1="${baseY}" x2="${VB.L+plotW}" y2="${baseY}" stroke="#9aa8bd" stroke-width="1.4"/>`;
  // bars
  bars.forEach((b,i)=>{
    const bw=slot*(b.narrow?0.30:b.wide?0.82:0.56), cx=VB.L+slot*i+slot/2, x=cx-bw/2;
    const y=valToY(cfg.ticks,b.value), h=baseY-y;
    s+=`<rect class="bar" x="${x}" y="${y}" width="${bw}" height="${Math.max(0,h)}" rx="3" fill="${b.color}"/>`;
    s+=`<text x="${cx}" y="${y-6}" text-anchor="middle" font-size="11" font-weight="700" fill="#3a4a63">${b.value}</text>`;
    s+=`<text x="${cx}" y="${baseY+16}" text-anchor="middle" font-size="11" fill="#3a4a63" font-family="Inter">${esc(b.label)}</text>`;
    if(eByBar[i]){
      s+=`<rect x="${x-5}" y="${y-5}" width="${bw+10}" height="${h+10}" rx="5" fill="none" stroke="#E11D74" stroke-width="2" stroke-dasharray="5 4"/>`;
      s+=badge(cx+bw/2+4,y-2,eByBar[i]);
    }
  });
  // title
  const titleY=22;
  if(cfg.title){s+=`<text x="${VB.L+plotW/2}" y="${titleY}" text-anchor="middle" font-size="13" font-weight="700" fill="#16243A" font-family="Space Grotesk">${esc(cfg.title)}</text>`;}
  else if(titleErr){s+=`<rect x="${VB.L+plotW/2-78}" y="9" width="156" height="20" rx="5" fill="none" stroke="#E11D74" stroke-width="2" stroke-dasharray="5 4"/>`+
    `<text x="${VB.L+plotW/2}" y="23" text-anchor="middle" font-size="10.5" fill="#E11D74" font-family="Inter">no title</text>`+badge(VB.L+plotW/2+86,19,titleErr);}
  // y label
  if(cfg.yLabel){s+=`<text x="16" y="${VB.T+plotH/2}" transform="rotate(-90 16 ${VB.T+plotH/2})" text-anchor="middle" font-size="11" fill="#4a5a72" font-family="Inter">${esc(cfg.yLabel)}</text>`;}
  // x label
  if(cfg.xLabel){s+=`<text x="${VB.L+plotW/2}" y="${VB.h-8}" text-anchor="middle" font-size="11.5" fill="#4a5a72" font-family="Inter">${esc(cfg.xLabel)}</text>`;}
  else if(xErr){s+=`<rect x="${VB.L+plotW/2-60}" y="${VB.h-22}" width="120" height="18" rx="5" fill="none" stroke="#E11D74" stroke-width="2" stroke-dasharray="5 4"/>`+
    `<text x="${VB.L+plotW/2}" y="${VB.h-9}" text-anchor="middle" font-size="10" fill="#E11D74" font-family="Inter">no x-axis label</text>`+badge(VB.L+plotW/2+68,VB.h-13,xErr);}
  // axis error highlight
  if(axisErr){s+=`<line x1="${VB.L}" y1="${topY}" x2="${VB.L}" y2="${baseY}" stroke="#E11D74" stroke-width="3"/>`+badge(VB.L-2,topY-2,axisErr);}
  s+=`</svg>`;
  return s;
}
function badge(x,y,n){return `<g><circle cx="${x}" cy="${y}" r="9" fill="#E11D74"/><text x="${x}" y="${y+4}" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">${n}</text></g>`;}

/* ============================== GRAPH DATA ============================== */

<script>
/* ============================== CONTENT BUILDERS ============================== */
let AID=0;
function tier(level,label,questions,answers){
  const cls={Green:'g',Orange:'o',Red:'r'}[label.split(' ')[0]]||'g';
  const id='a'+(AID++);
  let qs=questions.map(q=>`<div class="q"><p class="qtext"><span class="qn">${q.n}</span> ${q.t}</p>${q.h?`<span class="hint">${q.h}</span>`:''}</div>`).join('');
  return `<div class="tier ${cls}">
    <div class="tierhd"><span class="chip ${cls}">${cls.toUpperCase()}</span><span class="label">${label}</span></div>
    ${qs}
    <div class="answers">
      <button class="revealbtn" data-rev="${id}">✓ Reveal answers</button>
      <div class="apanel" id="${id}"><div class="inner"><h5>Answer key</h5>${answers}</div></div>
    </div></div>`;
}
function graphBlock(gid,caption,findingsTitle){
  const g=GRAPHS[gid];
  const modes=g.hideModes?'':`<div class="modes" data-gid="${gid}">
      ${g.drawn?'<button class="mode" data-mode="drawn" aria-pressed="true">As drawn</button>':''}
      ${g.drawn?'<button class="mode" data-mode="highlight" aria-pressed="false">Highlight errors</button>':''}
      <button class="mode good" data-mode="correct" aria-pressed="false">Correct version</button>
    </div>`;
  return `<div class="graphwrap">
    <div>${modes}<div class="chart" id="chart-${gid}"></div></div>
    <div>${caption||''}<div class="findings" id="find-${gid}"></div></div>
  </div>`;
}
function findingsHTML(gid){
  const g=GRAPHS[gid]; if(!g.findings)return '';
  return g.findings.map((f,i)=>`<div class="finding"><span class="fbadge">${i+1}</span><span>${f.t}</span></div>`).join('');
}

S('good','Good graph','1',`
  <div class="eyebrow good">Self-learning · the standard to compare against</div>
  <h2 class="h-title">What makes a good graph?</h2>
  <p class="lede">Before you can find errors, you need to know what a correct graph looks like. Here’s the gold standard — and the checklist you’ll use every single time.</p>
  <div class="card">
    <h3>A graph you <em>can</em> trust</h3>
    ${graphBlock('good')}
  </div>
  <div class="card">
    <h3>The 8-point checklist</h3>
    <p class="sub">Tap each one as you check it. Every good graph passes all eight.</p>
    <ul class="check" id="checklist">
      ${[['Title','Names the topic, who was measured, and the sample size.'],
         ['Y-axis label','Says what the numbers mean (e.g. “Number of students”).'],
         ['X-axis label','Names the categories being compared (e.g. “Colour”).'],
         ['Scale starts at zero','The y-axis begins at 0 and rises in equal steps.'],
         ['Bars correct height','Every bar matches the data — check it against the tally.'],
         ['Equal bar widths','All bars the same width; a narrow bar looks like less.'],
         ['Consistent colours','Bars of the same data type are all one colour.'],
         ['Data adds up','All bar values sum to the total in the title.']]
        .map(([h,d])=>`<li><span class="box">✓</span><span class="t"><b>${h}</b><br>${d}</span></li>`).join('')}
    </ul>
  </div>
  <div class="card">
    <h3>The 5-step error method</h3>
    <p class="sub">Use this on every faulty graph from here on.</p>
    <ul class="steps">
      <li><b>Read the title.</b> Does it name the topic and who was measured? Note any numbers (e.g. “30 students”) — you’ll check them later.</li>
      <li><b>Check the y-axis.</b> Does it start at 0? Do the numbers rise in equal steps? Write out the gaps.</li>
      <li><b>Check each bar vs the data.</b> Read each bar’s height, then compare to the tally. Any mismatch is an error.</li>
      <li><b>Check the bars themselves.</b> Same width? Same colour? Any difference is an error.</li>
      <li><b>Write up each error.</b> <em>Name it → Evidence (numbers) → Why it matters.</em></li>
    </ul>
  </div>`);

    {n:'Q4',t:'Using the corrected data (Red 4, Yellow 4, Blue 8), which colour is most popular? How many more chose blue than red?',h:'Most popular = tallest bar. Difference = Blue − Red.'}],

     <p><span class="an">Q4</span> Blue is most popular; Blue − Red = 8 − 4 = <b>4 more students</b>.</p>`)}
  ${tier(2,'Orange — building understanding',[

    {n:'Q6',t:'Add the bar heights as shown (4 + 9 + 8). What do you get, and what problem does that create?',h:'Compare your total to the stated 16.'},
    {n:'Q7',t:'Write a valid conclusion using the corrected data. Include percentages where possible.',h:'Blue = 8/16 = ?%'},

    `<p><span class="an">Q5</span> Yellow shows 9 but the tally is 4 — an error of 5 units (125% too high). A reader would wrongly think Yellow is most popular; really it’s Blue (8).</p>

     <p><span class="an">Q7</span> Blue most popular at 8/16 = 50%; Red and Yellow are equal at 4/16 = 25% each.</p>

  ${tier(3,'Red — challenge',[
    {n:'Q9',t:'A newspaper uses the faulty graph: “Yellow nearly beats Blue in colour vote!” Using all three errors, explain in detail why this headline is not valid.'},
    {n:'Q10',t:'The tally and frequency both say 4, but the bar is drawn at 9. Propose two explanations for how this happened. Which is more likely, and why?'},
    {n:'Q11',t:'If 20 students were surveyed with corrected totals Red 5, Yellow 5, Blue 10, would the percentage distribution change? Show your working.'}],
    `<p><span class="an">Q9</span> False. Yellow’s real value is 4, not 9 — far below Blue (8), not nearly equal. The three errors (scale from 1; Yellow wrong by 5; total 21 not 16) all distort the picture; none support the headline.</p>
     <p><span class="an">Q10</span> (1) a graphing slip — the wrong value was plotted; (2) the tally was mis-recorded as 9 — but that would make the total 21, contradicting the table. So a graphing slip is more likely.</p>
     <p><span class="an">Q11</span> Red 5/20 = 25%, Yellow 5/20 = 25%, Blue 10/20 = 50% — identical distribution. Doubling every value proportionally doesn’t change the percentages.</p>`)}`);

  ${tier(2,'Orange — building understanding',[
    {n:'Q4',t:'Explain the error with numbers. What should the Fish bar show? Show working.',h:'Fish = 30 − (12+8+3+2).'},

/* ============================== RENDER + WIRING ============================== */
const canvas=document.getElementById('canvas'), nav=document.getElementById('nav');
SECTIONS.forEach((s,i)=>{
  const sec=document.createElement('section'); sec.className='view'; sec.id='view-'+s.id;
  sec.innerHTML=s.html+pager(i);
  canvas.appendChild(sec);
  const li=document.createElement('li');
  li.innerHTML=`<button data-go="${s.id}"><span class="ix">${s.ix}</span>${s.nav}</button>`;
  nav.appendChild(li);
});
function pager(i){
  const prev=i>0?SECTIONS[i-1]:null, next=i<SECTIONS.length-1?SECTIONS[i+1]:null;
  return `<div class="pager">
    <button data-go="${prev?prev.id:''}" ${prev?'':'disabled'}>← ${prev?prev.nav:'Start'}</button>
    <button data-go="${next?next.id:''}" ${next?'':'disabled'}>${next?next.nav:'End'} →</button></div>`;
}

let current=null;
function show(id){
  if(!id)return;
  document.querySelectorAll('section.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+id));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.go===id));
  current=id;
  // draw all charts that live in this section
  Object.keys(GRAPHS).forEach(gid=>{
    const host=document.getElementById('chart-'+gid);
    if(host && document.getElementById('view-'+id).contains(host)){
      const g=GRAPHS[gid], def=g.drawn?'drawn':'correct';
      drawGraph(gid,def);
      const f=document.getElementById('find-'+gid); if(f)f.innerHTML=findingsHTML(gid);
    }
  });
  window.scrollTo({top:0,behavior:'auto'});
  document.getElementById('sidebar').classList.remove('open');
}
function drawGraph(gid,mode){
  const g=GRAPHS[gid], host=document.getElementById('chart-'+gid); if(!host)return;
  const cfg=(mode==='correct')?g.correct:g.drawn;
  host.innerHTML=renderChart(cfg, mode==='highlight');
}

document.addEventListener('click',e=>{
  const go=e.target.closest('[data-go]'); if(go){show(go.dataset.go);return;}
  const m=e.target.closest('.mode'); if(m){
    const gid=m.closest('.modes').dataset.gid;
    m.parentElement.querySelectorAll('.mode').forEach(b=>b.setAttribute('aria-pressed','false'));
    m.setAttribute('aria-pressed','true');
    drawGraph(gid,m.dataset.mode); return;
  }
  const rev=e.target.closest('[data-rev]'); if(rev){
    const p=document.getElementById(rev.dataset.rev), open=p.classList.toggle('open');
    rev.textContent=open?'✕ Hide answers':'✓ Reveal answers'; return;
  }
  const cl=e.target.closest('#checklist li'); if(cl){cl.classList.toggle('done');return;}
  const flt=e.target.closest('[data-flt]'); if(flt){
    document.querySelectorAll('[data-flt]').forEach(b=>b.setAttribute('aria-pressed','false'));
    flt.setAttribute('aria-pressed','true');
    document.body.classList.remove('flt-g','flt-o','flt-r');
    if(flt.dataset.flt!=='all')document.body.classList.add('flt-'+flt.dataset.flt);
    return;
  }
  if(e.target.id==='menubtn'){const sb=document.getElementById('sidebar');sb.classList.toggle('open');}
});

// teacher view = reveal/hide all answers
document.getElementById('teacher').addEventListener('click',e=>{
  const on=e.currentTarget.getAttribute('aria-pressed')!=='true';
  e.currentTarget.setAttribute('aria-pressed',on);
  document.querySelectorAll('.apanel').forEach(p=>p.classList.toggle('open',on));
  document.querySelectorAll('[data-rev]').forEach(b=>b.textContent=on?'✕ Hide answers':'✓ Reveal answers');
});

// keyboard arrows
document.addEventListener('keydown',e=>{
  if(e.target.matches('input,textarea'))return;
  const i=SECTIONS.findIndex(s=>s.id===current);
  if(e.key==='ArrowRight'&&i<SECTIONS.length-1)show(SECTIONS[i+1].id);
  if(e.key==='ArrowLeft'&&i>0)show(SECTIONS[i-1].id);
});

show('welcome');
</script>
